<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Easy Tic Tac Toe</title>
    <style>
      /* 
         BASIC STYLING 
         -------------
         We use a simple accessible font and center everything.
      */
      body {
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 50px;
        background-color: #f0f0f0;
      }

      h1 {
        margin-bottom: 20px;
      }

      /* 
         GAME STATUS
         -----------
         Shows whose turn it is or who won.
      */
      #status {
        margin-bottom: 20px;
        font-size: 1.2rem;
        font-weight: bold;
      }

      /* 
         THE BOARD 
         ---------
         We use CSS Grid for the 3x3 layout. It is much easier than using Flexbox for grids.
         - grid-template-columns: repeat(3, 100px) -> creates 3 columns, each 100px wide.
         - gap: 5px -> provides the spacing between cells.
      */
      #board {
        display: grid;
        grid-template-columns: repeat(3, 100px);
        grid-template-rows: repeat(3, 100px);
        gap: 5px;
        background-color: #333; /* Dark background shows through the gap to look like borders */
        padding: 5px;
        border-radius: 5px;
      }

      /* 
         INDIVIDUAL CELLS
         ----------------
         Each cell is a white square.
      */
      .cell {
        background-color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 3rem;
        cursor: pointer;
        font-weight: bold;
      }

      .cell:hover {
        background-color: #fafafa;
      }

      /* 
         RESTART BUTTON
         --------------
      */
      #restart-btn {
        margin-top: 20px;
        padding: 10px 20px;
        font-size: 1rem;
        cursor: pointer;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
      }

      #restart-btn:hover {
        background-color: #0056b3;
      }
    </style>
  </head>
  <body>
    <h1>Tic Tac Toe</h1>

    <!-- This div will display "Player X's Turn" or "Player O Wins!" -->
    <div id="status">Player X's turn</div>

    <!-- The Game Board -->
    <div id="board">
      <!-- We give each cell an index number to easy track it in JavaScript -->
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
    </div>

    <button id="restart-btn">Restart Game</button>

    <script>
      /* 
         GAME VARIABLES
         --------------
      */
      // We store the game state in an array of 9 empty strings.
      // Index 0 is top-left, index 8 is bottom-right.
      let gameState = ["", "", "", "", "", "", "", "", ""];

      // Keeps track of valid game state. If someone wins, this becomes false.
      let gameActive = true;

      // Starts with "X"
      let currentPlayer = "X";

      /* 
         DOM ELEMENTS
         ------------
         We grab references to the elements we need to update.
      */
      const statusDisplay = document.getElementById("status");
      const cells = document.querySelectorAll(".cell");
      const restartBtn = document.getElementById("restart-btn");

      /* 
         WINNING CONDITIONS
         ------------------
         These are the indices for all possible ways to win:
         - 3 rows
         - 3 columns
         - 2 diagonals
      */
      const winningConditions = [
        [0, 1, 2], // Top row
        [3, 4, 5], // Middle row
        [6, 7, 8], // Bottom row
        [0, 3, 6], // Left column
        [1, 4, 7], // Middle column
        [2, 5, 8], // Right column
        [0, 4, 8], // Diagonal top-left to bottom-right
        [2, 4, 6], // Diagonal top-right to bottom-left
      ];

      /* 
         GAME LOGIC FUNCTIONS
         --------------------
      */

      // 1. Handle Click: What happens when a user clicks a cell?
      function handleCellClick(clickedCellEvent) {
        // Get the specific HTML element that was clicked
        const clickedCell = clickedCellEvent.target;

        // Get the 'data-index' attribute (0-8) to know which cell it is
        const clickedCellIndex = parseInt(
          clickedCell.getAttribute("data-index"),
        );

        // Check if the cell has already been played OR if the game is paused/over
        if (gameState[clickedCellIndex] !== "" || !gameActive) {
          return; // Do nothing
        }

        // Check update logic
        handleCellPlayed(clickedCell, clickedCellIndex);
        handleResultValidation();
      }

      // 2. Update State: Update the internal array and the UI
      function handleCellPlayed(clickedCell, clickedCellIndex) {
        // Update our internal data
        gameState[clickedCellIndex] = currentPlayer;
        // Update the visual HTML
        clickedCell.innerHTML = currentPlayer;
        // OPTIONAL: Add colors for X and O
        clickedCell.style.color = currentPlayer === "X" ? "#d9534f" : "#5bc0de";
      }

      // 3. Check Conditions: Did someone win? Is it a draw?
      function handleResultValidation() {
        let roundWon = false;

        // Loop through all 8 winning conditions
        for (let i = 0; i < winningConditions.length; i++) {
          const winCondition = winningConditions[i];

          let a = gameState[winCondition[0]];
          let b = gameState[winCondition[1]];
          let c = gameState[winCondition[2]];

          // If any cell in the combo is empty, we can't have a winner yet for this line
          if (a === "" || b === "" || c === "") {
            continue;
          }

          // If all three match (e.g. X, X, X), we have a winner
          if (a === b && b === c) {
            roundWon = true;
            break;
          }
        }

        if (roundWon) {
          statusDisplay.innerHTML = `Player ${currentPlayer} has won!`;
          gameActive = false;
          return;
        }

        // If no roundWon, check for draw (no empty strings left in gameState)
        let roundDraw = !gameState.includes("");
        if (roundDraw) {
          statusDisplay.innerHTML = `Draw!`;
          gameActive = false;
          return;
        }

        // If no win and no draw, switch turns
        handlePlayerChange();
      }

      // 4. Switch Player: Change X to O or O to X
      function handlePlayerChange() {
        currentPlayer = currentPlayer === "X" ? "O" : "X";
        statusDisplay.innerHTML = `Player ${currentPlayer}'s turn`;
      }

      // 5. Restart Game: Reset everything to initial state
      function handleRestartGame() {
        gameActive = true;
        currentPlayer = "X";
        gameState = ["", "", "", "", "", "", "", "", ""];
        statusDisplay.innerHTML = `Player X's turn`;

        // Clear the board UI
        cells.forEach((cell) => {
          cell.innerHTML = "";
          cell.style.color = "black"; // Reset color
        });
      }

      /* 
         EVENT LISTENERS
         ---------------
         Attach the click events to the elements
      */
      cells.forEach((cell) => cell.addEventListener("click", handleCellClick));
      restartBtn.addEventListener("click", handleRestartGame);
    </script>
  </body>
</html>
